language: 'nb'
intents:
  HassTurnOff:
    data:
      - sentences:
        - "<lukk> <navn>"
      - sentences:
          - "<lukk> <navn>"
          - "<lukk> <navn> <i_på> <område>"
        response: cover
      - sentences:
          - "<lukk> garasje[dør|port][en]"
          - "<lukk> [dør|port][en] <i_på> garasje[n]"
        slots:
          domain: cover
          device_class: garage
        response: cover
      - sentences:
          - "<lukk> <vindu> <i_på> <område>"
          - "<lukk> <område> <vindu>"
        slots:
          domain: cover
          device_class:
            - window
            - blind
            - curtain
            - shutter
        response: cover_area
